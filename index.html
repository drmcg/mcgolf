<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/mcgolf/manifest.json" />
  <title>3D Golf Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="hud">
    <h1>3D Golf Game</h1>
    <button id="installButton" style="display: none; width: 100%; margin-bottom: 12px;">Install App</button>
    <div class="panel">
      <label>Hole <span id="holeNumber">1</span> of <span id="totalHoles">9</span></label>
      <div id="courseScoreDisplay"></div>
    </div>
    <div class="panel">
      <label for="club">Club</label>
      <select id="club"></select>
    </div>
    <div class="panel">
      <label for="power">Power <span id="powerValue">50</span>%</label>
      <input id="power" type="range" min="10" max="100" value="50" />
    </div>
    <div class="panel">
      <label for="aim">Aim <span id="aimValue">0</span>°</label>
      <input id="aim" type="range" min="-45" max="45" value="0" />
    </div>
    <button id="hitButton">Hit Ball</button>
    <button id="nextHoleButton" style="display: none; margin-top: 8px;">Next Hole</button>
    <div id="status"></div>
    <div id="scoreboard">
      <div>Par: <span id="par">0</span></div>
      <div>Shots: <span id="shotCount">0</span></div>
      <div>Distance: <span id="distanceToHole">0</span> m</div>
    </div>
  </div>
  <div id="canvasContainer"></div>

  <script src="lib/three.min.js"></script>
  <script src="lib/OrbitControls.js"></script>
  <script src="script.js"></script>
</body>
</html>
